# For all categories, see https://wiki.hyprland.org/Configuring/Variables/

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 4
    gaps_out = 4
    border_size = 3
    col.active_border = rgba(f4b8e4ee) rgba(f4b8e4aa) 20deg
    col.inactive_border = rgba(bbcde5ee) rgba(c6d0f5ee) 20deg
    layout = dwindle
    resize_on_border = true 
    extend_border_grab_area = 25
    resize_corner = 2
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
  rounding = 6
  drop_shadow = yes
  shadow_range = 4
  shadow_render_power = 3
  col.shadow = rgba(1a1a1aee)

   blur {
    enabled = true	
    size = 5
    passes = 1
    ignore_opacity = true
    new_optimizations = true
    xray = true
    special = true
    }
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

misc {
    disable_hyprland_logo = true
    col.splash = rgba(f9f5f4dd)
	animate_manual_resizes = true
	enable_swallow = true
	new_window_takes_over_fullscreen = 2

}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

gestures {
    workspace_swipe = on
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
#device:epic-mouse-v1 {
#    sensitivity = -0.5
#}

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

#opacity (transparent) #enable as desired
windowrulev2 = opacity 0.98 0.95, class:^(firefox)$
windowrulev2 = opacity 0.95 0.9, class:^(nautilus)$
windowrulev2 = opacity 0.90 0.875, class:^(kitty)$
windowrulev2 = opacity 0.9 0.7, class:^(code)$
#needed for screensharing with xwaylandvideobridge
#windowrulev2 = opacity 0.0 override 0.0 override,class:^(xwaylandvideobridge)$
#windowrulev2 = noanim,class:^(xwaylandvideobridge)$
#windowrulev2 = nofocus,class:^(xwaylandvideobridge)$
#windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER 

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, T,exec, kitty 
bind = $mainMod, Q, killactive,
bind = CTRLSHIFT, Q, exit,
bind = $mainMod, B, exec, firefox
bind = $mainModSHIFT, B, exec, brave
bind = $mainMod, E, exec, kitty -e ranger 
bind = $mainMod, V, togglefloating,
bind = ALT, space, exec, ulauncher 
#bind = $mainMod, S, exec, wofi --show run
bind = $mainModSHIFT, S, exec, spotify --enable-features=UseOzonePlatform --ozone-platform=wayland
bind = $mainModSHIFT, D, exec, discord --enable-features=UseOzonePlatform --ozone-platform=wayland
bind = $mainMod, M, fullscreen, 0 # toggle 0/1
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, O, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = alt, 1, workspace, 1
bind = alt, 2, workspace, 2
bind = alt, 3, workspace, 3
bind = alt, 4, workspace, 4
bind = alt, 5, workspace, 5
bind = alt, 6, workspace, 6
bind = alt, 7, workspace, 7
bind = alt, 8, workspace, 8
bind = alt, 9, workspace, 9
bind = alt, 0, workspace, 10
#bind = $mainMod, , workspace, e-1
#bind = $mainMod, , workspace, e+1

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod, 1, movetoworkspace, 1
bind = $mainMod, 2, movetoworkspace, 2
bind = $mainMod, 3, movetoworkspace, 3
bind = $mainMod, 4, movetoworkspace, 4
bind = $mainMod, 5, movetoworkspace, 5
bind = $mainMod, 6, movetoworkspace, 6
bind = $mainMod, 7, movetoworkspace, 7
bind = $mainMod, 8, movetoworkspace, 8
bind = $mainMod, 9, movetoworkspace, 9
bind = $mainMod, 0, movetoworkspace, 10

# Special workspace / scratchpad
bind = $mainMod SHIFT, RETURN, movetoworkspace, special
bind = $mainMod, RETURN, togglespecialworkspace,

# group
bind = $mainMod, G, togglegroup
bind = $mainMod, period, changegroupactive    # move through
bind = $mainMod, comma, changegroupactive, b  # move back
#bind = ALT, tab, cyclenext,          # change focus to another window
#bind = ALT SHIFT, tab, bringactivetotop,   # bring it to the top


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# must add to enable screensharing - https://gist.github.com/brunoanc/2dea6ddf6974ba4e5d26c3139ffb7580
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
